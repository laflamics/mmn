# Nginx configuration for noxtiz.com/mmn
# Add this to your nginx server block

location /mmn/ {
    # Alias to the dist folder
    alias /var/www/noxtiz.com/mmn/dist/;
    
    # Try to serve the file, if not found try directory, if not found serve index.html
    try_files $uri $uri/ /mmn/index.html;
    
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
    gzip_min_length 1000;
    
    # Cache headers for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Cache headers for HTML
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Disable directory listing
    autoindex off;
}

